name: Build (script)

# Fast path: assembles the IPK with build-ipk.sh (bundles the pre-compiled
# blue-merle-touch binary). The companion sdk-build.yml workflow compiles the
# daemon from source with the OpenWrt SDK; releases carry both IPKs.
#
# No paths-ignore filters: their interaction with tag pushes is unreliable
# and a skipped build on a release tag would publish nothing. The build takes
# seconds, so README-only pushes rebuilding is an acceptable cost.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # The release version lives in build-ipk.sh and the Makefile, not in
      # the tag — refuse to release when they disagree.
      - name: Verify tag matches PKG_VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          SH_VER="$(sed -n 's/^PKG_VERSION=//p' build-ipk.sh)"
          MK_VER="$(sed -n 's/^PKG_VERSION:=//p' Makefile)"
          if [ "$SH_VER" != "$TAG" ] || [ "$MK_VER" != "$TAG" ]; then
            echo "::error::Tag v${TAG} does not match PKG_VERSION (build-ipk.sh=${SH_VER}, Makefile=${MK_VER}). Bump both, commit, then re-tag."
            exit 1
          fi

      - name: Build IPK
        env:
          BUILD_METHOD: ${{ startsWith(github.ref, 'refs/tags/') && 'Release' || 'CI' }}
        run: ./build-ipk.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: blue-merle-v2-${{ github.ref_name }}-${{ github.sha }}
          path: "*.ipk"
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.ipk"
          generate_release_notes: true
          fail_on_unmatched_files: true
