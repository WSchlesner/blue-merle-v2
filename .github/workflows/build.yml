name: Build

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build IPK
        run: ./build-ipk.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blue-merle-${{ github.ref_name }}-${{ github.sha }}
          path: "*.ipk"
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.ipk"
          generate_release_notes: true
          fail_on_unmatched_files: true
