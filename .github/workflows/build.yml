name: Build

# No paths-ignore filters: their interaction with tag pushes is unreliable
# and a skipped build on a release tag would publish nothing. The build takes
# seconds, so README-only pushes rebuilding is an acceptable cost.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build IPK
        env:
          BUILD_METHOD: ${{ startsWith(github.ref, 'refs/tags/') && 'release' || 'ci' }}
        run: ./build-ipk.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blue-merle-v2-${{ github.ref_name }}-${{ github.sha }}
          path: "*.ipk"
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.ipk"
          generate_release_notes: true
          fail_on_unmatched_files: true
